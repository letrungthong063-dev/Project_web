<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Bảng Xếp Hạng  - YAHUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div id="navbar"></div>

    <div class="max-w-4xl mx-auto p-6">
        <h1 class="text-2xl font-bold mb-6">Tạo Bảng Xếp Hạng</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Form -->
            <div class="bg-gray-800 p-6 rounded-lg">
                <form id="bxhForm">
                    <div class="mb-4">
                        <label class="block text-sm mb-1">Account ID *</label>
                        <input type="text" id="accountid" required class="w-full bg-gray-700 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm mb-1">Thời gian bắt đầu </label>
                        <input type="text" id="start_time" placeholder="23/03/2026 19:00" required class="w-full bg-gray-700 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm mb-1">Thời gian kết thúc </label>
                        <input type="text" id="end_time" placeholder="23/03/2026 23:00" required class="w-full bg-gray-700 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm mb-1">Background  <a href="/backgrounds" class="text-blue-400 text-xs">(xem danh sách)</a></label>
                        <input type="text" id="background" placeholder="bg1" required class="w-full bg-gray-700 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm mb-1">Tên giải đấu</label>
                        <input type="text" id="custom_name" class="w-full bg-gray-700 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                    <!-- Nâng cao -->
                    <details class="mb-4">
                        <summary class="cursor-pointer text-sm text-gray-400 hover:text-white">Tùy chọn nâng cao</summary>
                        <div class="mt-3 space-y-3">
                            <div>
                                <label class="block text-sm mb-1">Xóa trận (vd: 1,3)</label>
                                <input type="text" id="remove_match" class="w-full bg-gray-700 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                            <div>
                                <label class="block text-sm mb-1">Đặt tên đội theo id (vd: 12345=Team A,54321=Team B)</label>
                                <input type="text" id="team_names" class="w-full bg-gray-700 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                            <div>
                                <label class="block text-sm mb-1">Thêm logo cho các đội <a href="/logos" class="text-blue-400 text-xs">(quản lý)</a></label>
                                <select id="add_logo" class="w-full bg-gray-700 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                                    <option value="">Không dùng</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm mb-1">Champion Rush </label>
                                <input type="number" id="champion_rush" value="0" min="0" class="w-full bg-gray-700 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                        </div>
                    </details>

                    <div id="error" class="hidden bg-red-600 text-white p-3 rounded mb-4 text-sm"></div>

                    <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 py-2 rounded font-bold">
                        Tạo Bảng Xếp Hạng
                    </button>
                </form>
            </div>

            <!-- Kết quả -->
            <div class="bg-gray-800 p-6 rounded-lg flex flex-col items-center justify-center min-h-64">
                <div id="loading" class="hidden text-center">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto mb-3"></div>
                    <p class="text-gray-400">Đang tạo bảng xếp hạng...</p>
                </div>
                <div id="result" class="hidden w-full">
                    <img id="resultImg" class="w-full rounded mb-3" alt="Bảng xếp hạng">
                    <button id="downloadBtn" class="w-full bg-green-600 hover:bg-green-700 py-2 rounded font-bold mb-3">Tải xuống</button>
                    <div id="matchInfo" class="text-sm text-gray-400"></div>
                </div>
                <div id="placeholder" class="text-gray-500 text-center">
                    <p>Kết quả sẽ hiển thị ở đây</p>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/auth.js"></script>
    <script>
        requireAuth();
        document.getElementById("navbar").innerHTML = renderNavbar("/dashboard");
        checkNotification();

        // Load logo sets
        async function loadLogoSets() {
            try {
                const res = await fetch("/api/logos", {headers: authHeaders()});
                const data = await res.json();
                const select = document.getElementById("add_logo");
                (data.logo_sets || []).forEach(ls => {
                    const opt = document.createElement("option");
                    opt.value = ls.id;
                    opt.textContent = ls.key_logo;
                    select.appendChild(opt);
                });
            } catch {}
        }
        loadLogoSets();

        document.getElementById("bxhForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const errorDiv = document.getElementById("error");
            const loading = document.getElementById("loading");
            const result = document.getElementById("result");
            const placeholder = document.getElementById("placeholder");
            const submitBtn = document.getElementById("submitBtn");

            errorDiv.classList.add("hidden");
            loading.classList.remove("hidden");
            result.classList.add("hidden");
            placeholder.classList.add("hidden");
            submitBtn.disabled = true;
            submitBtn.textContent = "Đang xử lý...";

            const payload = {
                accountid: document.getElementById("accountid").value,
                start_time: document.getElementById("start_time").value,
                end_time: document.getElementById("end_time").value,
                background: document.getElementById("background").value,
                custom_name: document.getElementById("custom_name").value,
                remove_match: document.getElementById("remove_match").value,
                team_names: document.getElementById("team_names").value,
                add_logo: document.getElementById("add_logo").value,
                champion_rush: parseInt(document.getElementById("champion_rush").value) || 0
            };

            try {
                const res = await fetch("/api/bxh", {
                    method: "POST",
                    headers: authHeaders(),
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail);

                const img = document.getElementById("resultImg");
                img.src = `data:image/png;base64,${data.image}`;

                document.getElementById("downloadBtn").onclick = () => {
                    const a = document.createElement("a");
                    a.href = img.src;
                    a.download = "leaderboard.png";
                    a.click();
                };

                // Thông tin trận
                const info = data.match_details.map(m =>
                    `<div>Trận ${m.index}: ${m.success ? "✅" : "❌"} Booyah: ${m.booyah}</div>`
                ).join("");
                document.getElementById("matchInfo").innerHTML = `<div class="mb-2 font-bold">${data.team_count} đội | ${data.match_details.length} trận</div>${info}`;

                loading.classList.add("hidden");
                result.classList.remove("hidden");
            } catch (err) {
                loading.classList.add("hidden");
                placeholder.classList.remove("hidden");
                errorDiv.textContent = err.message;
                errorDiv.classList.remove("hidden");
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Tạo Bảng Xếp Hạng";
            }
        });
    </script>
</body>
</html>
